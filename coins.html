<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenanga - My Coins</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .coins-container {
            text-align: center;
            padding: 20px 0;
        }
        .name-select-box {
            margin-bottom: 30px;
        }
        .coin-display {
            background: linear-gradient(135deg, #003366, #0055aa);
            border-radius: 20px;
            padding: 30px;
            color: white;
            margin-bottom: 20px;
        }
        .coin-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }
        .gold-coin-large {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 35% 35%, #FFE566, #FFD700, #B8860B);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #B8860B;
            box-shadow: 0 4px 15px rgba(255,215,0,0.5), inset 0 -3px 6px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            border: 3px solid #DAA520;
        }
        .coin-total {
            font-size: 48px;
            font-weight: 800;
            color: #FFD700;
        }
        .coin-label {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }
        .streak-box {
            background: #f9f9f9;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .streak-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .streak-days {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        .streak-day {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            border: 2px solid #e0e0e0;
            color: #999;
        }
        .streak-day.completed {
            background: #FFD700;
            border-color: #FFD700;
            color: #003366;
        }
        .streak-day.current {
            background: #003366;
            border-color: #003366;
            color: white;
        }
        .streak-info {
            font-size: 13px;
            color: #666;
        }
        .streak-info strong {
            color: #003366;
        }
        .redeem-btn {
            width: 100%;
            padding: 18px;
            background: #FFD700;
            color: #003366;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        .redeem-btn:hover:not(:disabled) {
            background: #FFC200;
            transform: translateY(-2px);
        }
        .redeem-btn:disabled {
            background: #e0e0e0;
            color: #999;
            cursor: not-allowed;
            transform: none;
        }
        .redeem-hint {
            font-size: 13px;
            color: #999;
            text-align: center;
        }
        .back-link {
            display: block;
            text-align: center;
            color: #003366;
            text-decoration: none;
            font-size: 14px;
            margin-top: 20px;
        }
        .hidden-section {
            display: none;
        }
        .loading-coins {
            color: #666;
            font-size: 14px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kenanga Money Changer</h1>
        <p class="subtitle">🪙 My Coins</p>

        <div class="name-select-box">
            <div class="input-group">
                <label>Select Your Name:</label>
                <select id="employeeSelect">
                    <option value="">-- Select Name --</option>
                </select>
            </div>
        </div>

        <div id="coinsSection" class="hidden-section">
            <div class="coins-container">
                <div class="coin-display">
                    <div class="coin-icon">
                    <img src="dollar.png" alt="coin" style="width:80px;height:80px;object-fit:contain;">
                </div>
                    <div class="coin-total" id="totalCoins">0</div>
                    <div class="coin-label">Total Coins</div>
                </div>

                <div class="streak-box">
                    <div class="streak-title">Current Streak</div>
                    <div class="streak-days" id="streakDays"></div>
                    <div class="streak-info" id="streakInfo"></div>
                </div>

                <button class="redeem-btn" id="redeemBtn" disabled onclick="redeemCoins()">
                    🎁 Redeem (100 coins)
                </button>
                <p class="redeem-hint" id="redeemHint">You need 50 coins to redeem</p>
            </div>
        </div>

        <p id="loadingCoins" class="loading-coins" style="display:none;text-align:center;">⟳ Loading coins...</p>

        <a href="index.html" class="back-link">← Back to Check-In</a>
    </div>

    <script src="coins-script.js"></script>
</body>
</html>
