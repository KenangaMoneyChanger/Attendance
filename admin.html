<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenanga Money Changer - Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container admin-container wide">
        <h1>Kenanga Money Changer</h1>
        <p class="subtitle">Admin Dashboard</p>

        <div id="adminPanel" class="">


            <div class="month-selector">
                <label>Month:</label>
                <select id="monthSelect"></select>
                <label>Year:</label>
                <select id="yearSelect"></select>
                <button onclick="loadAttendance(); renderCalendar();">Refresh</button>
            </div>

            <div class="collapsible-section">
                <div class="section-header" onclick="toggleSection('summarySection')">
                    <h2>Monthly Summary</h2>
                    <button class="hide-btn" id="summaryToggle">Hide ▲</button>
                </div>
                <div id="summarySection">
                    <div id="summaryTable"></div>
                </div>
            </div>

            <div class="collapsible-section">
                <div class="section-header" onclick="toggleSection('calendarSection')">
                    <h2>Holiday Calendar</h2>
                    <button class="hide-btn" id="calendarToggle">Hide ▲</button>
                </div>
                <div id="calendarSection">
                    <p style="font-size:13px;color:#666;margin-bottom:10px;">Click any weekday to mark/unmark as holiday.</p>
                    <div id="calendarContainer"></div>
                </div>
            </div>

            <div class="collapsible-section">
                <div class="section-header" onclick="toggleSection('settingsSection')">
                    <h2>Employee Settings</h2>
                    <button class="hide-btn" id="settingsToggle">Hide ▲</button>
                </div>
                <div id="settingsSection">
                    <div id="employeeSettings"></div>
                    <button onclick="saveEmployeeSettings()" class="save-btn">Save Settings</button>
                </div>
            </div>

            <button onclick="exportCSV()" class="export-btn">Export CSV</button>
        </div>
    </div>

    <script>
        function toggleSection(id) {
            const section = document.getElementById(id);
            const toggleId = id.replace('Section', 'Toggle');
            const btn = document.getElementById(toggleId);
            if (section.style.display === 'none') {
                section.style.display = '';
                btn.textContent = 'Hide ▲';
            } else {
                section.style.display = 'none';
                btn.textContent = 'Show ▼';
            }
        }
    </script>
    <script src="admin-script.js"></script>
</body>
</html>
