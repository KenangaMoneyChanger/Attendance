<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenanga Money Changer - Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container admin-container">
        <h1>Kenanga Money Changer</h1>
        <p class="subtitle">Admin Dashboard</p>

        <div id="loginBox" class="login-box">
            <h3>Admin Login</h3>
            <input type="password" id="adminPin" placeholder="Enter Admin PIN">
            <button onclick="adminLogin()">Login</button>
            <p id="loginError" class="error-text hidden">Incorrect PIN</p>
        </div>

        <div id="adminPanel" class="hidden">

            <div class="month-selector">
                <label>Month:</label>
                <select id="monthSelect" onchange="loadAttendance()"></select>
                <label>Year:</label>
                <select id="yearSelect" onchange="loadAttendance()"></select>
            </div>

            <div class="summary-section">
                <h2>Monthly Summary</h2>
                <div id="summaryTable"></div>
            </div>

            <div class="bonus-section">
                <h2>Employee Settings</h2>
                <div id="employeeSettings"></div>
                <button onclick="saveEmployeeSettings()" class="save-btn">Save Settings</button>
            </div>

            <button onclick="exportCSV()" class="export-btn">Export CSV</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="admin-script.js"></script>
</body>
</html>
